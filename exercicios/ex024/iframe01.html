<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframes</title>
    <style>
        iframe{
            width: 400px;
            height: 400px;
            border: 2px dashed #dd1414;
        }
    </style>
</head>
<body>
    <h1>Testando Iframes</h1>
    <p>Aqui está o site do Curso em Vídeo: 
        <iframe src="https://www.cursoemvideo.com" frameborder="0" scrolling="auto">
        <!-- Caso o iframe não seja suportado adicione um link, e use o scrolling para permitir a rolagem ou não -->
          <a href="https://www.cursoemvideo.com" target="_blank">Acesse o Curso em Vídeo</a>
    </iframe> em iframe</p>
</body>
</html>
