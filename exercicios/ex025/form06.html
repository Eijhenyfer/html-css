<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range, color, file</title>
</head>
<body>
    <form action="cadastro.php" method="post">
        <fieldset>
            <legend>Escolha</legend>
            <label for="icor">Cor</label>
            <input type="color" name="cor" id="icor" value="#ff0000"><br>
            <label for="inivel">Nivel de satisfação</label>
            <input type="range" name="nivel" id="inivel" min="0" max="5" value="0"><br>
            <label for="ifile">Escolha um arquivo</label>
            <input type="file" name="file" id="ifile"><br>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </fieldset>
    </form>
</body>
</html>
