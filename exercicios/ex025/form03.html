<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mês, data, número</title>
</head>
<body>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="inome">Nome</label>
            <input type="text" name="nome" id="inome" maxlength="30" placeholder="Nome do aluno" required autocomplete="name">
            <p>
                <label for="imedia">Media</label>
                <input type="number" name="media" id="imedia" min="0" max="10" step="0.1" placeholder="entre 0 e 10" required>
            </p>
            <p>
                <label for="imes">Período letivo</label>
                <input type="month" name="mes" id="imes" value="2026-01">
            </p>
            <p>
                <label for="idata">Data da prova</label>
                <input type="date" name="data" id="idata" value="2026-01-01">
            </p>
            <p>
                <label for="ihora">Horário da prova</label>
                <input type="time" name="hora" id="ihora">
            </p>
            <p>
                <input type="reset" value="Limpar">
                <input type="submit" value="Enviar">
            </p>
        </p>
    </form>
</body>
</html>
