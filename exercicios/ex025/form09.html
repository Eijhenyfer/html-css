<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>output</title>
</head>
<body>
    <form action="cadastro.php" method="get">
        <p>
            <label for="iesc">Escala</label>
            <input type="range" name="num" id="iesc" min="0" max="10" oninput="inum.innerHTML=Number(iesc)">
            <output id="inum">0</output>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
