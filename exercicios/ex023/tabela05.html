<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colgroup</title>
    <style>
        table, td, th{
            border: 1px solid black;
            border-collapse: collapse;
            padding: 10px;
        }
        col.2{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
            <col>
            <col class="2" span="2">
            <col>
        </colgroup>
        <thead>
            <tr>
                <th> Nome</th>
                <th> Idade </th>
                <th> Profissão</th>
                <th>  Cidade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ana</td>
                <td>22</td>
                <td> Médica</td>
                <td>São Paulo</td>
            </tr>
            <tr>
                <td> João </td>
                <td>19</td>
                <td> Professor</td>
                <td> Rio de Janeiro</td>
            </tr>
            <tr>
                <td> Maria</td>
                <td>26</td>
                <td> Engenheira</td>
                <td> Brasília</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
