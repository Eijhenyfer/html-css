<!DOCTYPE html>
<html lang="p">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas grandes</title>
    <style>
        table{
            border: 1px solid black;
            border-collapse: collapse;
            width: 500px;
            position: relative; 
        }
        caption{
            font-size: 1.5em;
            padding: 5px;
            color: #b16bc7;
            background-color: rgb(241, 235, 235);
        }
        tbody tr:nth-child(even){
            background-color: rgb(241, 235, 235);
            color: #b16bc7;
        }
        tbody tr:nth-child(odd){
            background-color: white;
            color: black;
        }
        thead tr th{
            position: sticky;
            top: -1px;
            background-color: #b16bc7;
        }
        td, th {
            border: 1px solid black;
            padding: 8px; 
        }
        td.num{
            text-align: right;
        }
        thead, tfoot{
            background-color: #b16bc7;
            color: rgb(241, 235, 235);
        }

    </style>
</head>
<body>
    <h1>Estados do Brasil</h1>

    <table>
        <caption>População dos Estados do Brasil</caption>
        <thead>
            <tr>
                <th scope="col">Estado</th>
                <th scope="col" style="width: 100px
                ;">População</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>São Paulo</td>
                <td class="num">12.4 million</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">6.7 million</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21.3 million</td>
            </tr>
            <tr>
                <td>Bahia</td>
                <td class="num">14.8 million</td>
            </tr>
            <tr>
                <td>Paraná</td>
                <td class="num">11.0 million</td>
            </tr>
            <tr>
                <td>Rio Grande do Sul</td>
                <td class="num">10.2 million</td>
            </tr>
            <tr>
                <td>Santa Catarina</td>
                <td class="num">7.8 million</td>
            </tr>
            <tr>
                <td scope="row">Goiás</td>
                <td class="num">6.5 million</td>
            </tr>
            <tr>
                <td scope="row">Pernambuco</td>
                <td class="num">9.6 million</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Total</th>
                <td class="num"><strong>00000</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
