<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
        }
        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Tabela espandida</h1>
    <table border="1">
        <tr>
            <td colspan="2">1</td>
            <td rowspan="3">3</td> 
        </tr>
        <tr>
            <td rowspan="2">4</td>
            <td>5</td>
        </tr>
        <tr>
            <td>8</td>
        </tr>
</body>
</html>
