<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio astronauta</title>
    <style>
        div#fora{
            background-color: blue;
            background-image: url(imagens/espaco.jpg);

        div#dentro{

    <div id="fora">
        <div id="dentro"></div>
    </div>
</body>
</html>
